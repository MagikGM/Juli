<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>🖕</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Importación de fuentes elegantes de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Montserrat:wght@300;400;600&family=Parisienne&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Canvas para efectos de fondo -->
    <canvas id="bg-canvas"></canvas>

    <!-- Canvas para confeti -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Pantalla de carga -->
    <div id="loader">
      <div class="heart-loader"></div>
    </div>

    <!-- Contenido Principal -->
    <div class="container">
      <!-- Sección 1: Portada / Hero -->
      <section class="hero reveal-element visible" id="home">
        <div class="hero-card">
          <div style="font-size: 3rem; margin-bottom: 10px">🖕</div>
          <h1 id="juliana" class="title-hero">🖕</h1>
          <p class="subtitle">🖕</p>
          <div style="margin-top: 20px">
            <div style="font-size: 40px; animation: heartBeat 2s infinite">🖕</div>
          </div>
        </div>
        <div class="scroll-indicator">
          <span class="scroll-text">🖕</span>
          <span>🖕</span>
        </div>
      </section>

      <!-- Sección 1.5: Fotos Nosotros (NUEVA) -->
      <section id="us-photos" class="reveal-element">
        <div style="text-align: center; margin-bottom: 20px;">
          <h2 class="section-title">🖕</h2>
        </div>
        <div class="photos-wrapper">
          <div class="photo-card rotate-left">
            <div style="font-size: 5rem; text-align: center;">🖕</div>
          </div>
          <div class="photo-divider">🖕</div>
          <div class="photo-card rotate-right">
            <div style="font-size: 5rem; text-align: center;">🖕</div>
          </div>
        </div>
      </section>

      <!-- Sección 2: Mensajes / Razones -->
      <section id="messages" class="reveal-element">
        <div style="text-align: center">
          <h2 class="section-title">🖕</h2>
        </div>
        <div class="message-grid">
          <div class="card">
            <span class="card-icon">🖕</span>
            <h3>🖕</h3>
            <p>🖕</p>
          </div>
          <div class="card">
            <span class="card-icon"></span>
            <h3>🖕</h3>
            <p>🖕</p>
          </div>
          <div class="card">
            <span class="card-icon">🖕</span>
            <h3>🖕</h3>
            <p>🖕</p>
          </div>
          <div class="card">
            <span class="card-icon"></span>
            <h3>🖕</h3>
            <p>🖕</p>
          </div>
        </div>
      </section>

      <!-- Sección 3: Promesas / Detalles -->
      <section id="promises" class="reveal-element">
        <div style="text-align: center">
          <h2 class="section-title">🖕</h2>
        </div>
        <ul class="promises-list">
          <li>
            <span>🖕</span>
            <p>🖕</p>
          </li>
          <li>
            <span></span>
            <p>🖕</p>
          </li>
          <li>
            <span></span>
            <p>🖕</p>
          </li>
          <li>
            <span>🖕</span>
            <p>🖕</p>
          </li>
          <li>
            <span>🖕</span>
            <p>🖕</p>
          </li>
        </ul>
      </section>

      <!-- Sección 4: La Propuesta -->
      <section id="proposal" class="proposal-area">
        <div style="font-size: 3.5rem; margin-bottom: 20px"></div>
        <h2 class="proposal-title">🖕</h2>
        <p style="margin-bottom: 30px; font-size: 1.1rem">🖕</p>

        <div class="buttons-container">
          <button id="btn-yes" class="btn btn-yes">🖕</button>
          <button id="btn-no" class="btn btn-no">🖕</button>
        </div>
      </section>

      <footer
        style="
          text-align: center;
          padding: 40px 0;
          color: rgba(89, 13, 34, 0.5);
          font-size: 0.9rem;
        "
      >
        🖕
      </footer>
    </div>

    <!-- Modal de Éxito -->
    <div id="success-modal" class="overlay">
      <div class="modal-content">
        <div class="modal-icon"></div>
        <h2
          style="
            font-family: var(--font-hand);
            font-size: 2.5rem;
            color: var(--primary-color);
          "
        >
          🖕
        </h2>
        <p style="margin-top: 20px; font-size: 1.1rem">🖕</p>
        <p style="margin-top: 10px; font-weight: bold">🖕</p>
        <button
          onclick="closeModal()"
          style="
            margin-top: 10px;
            padding: 10px 30px;
            border-radius: 20px;
            border: none;
            background: var(--secondary-color);
            color: white;
            cursor: pointer;
          "
        >
          🖕
        </button>
      </div>
    </div>

    <!-- JAVASCRIPT: Lógica, Animaciones y Magia -->
    <script src="script.js"></script>
  </body>
</html>
